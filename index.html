<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Advanced eye care hospital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #eef2f7;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 1.8rem 2rem 2.5rem 2rem;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #e9edf2;
            padding-bottom: 1rem;
        }
        .header-row h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1F5E8E, #2C8FBB);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .create-appointment-btn {
            background: #1F5E8E;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        .create-appointment-btn:hover {
            background: #0e4a72;
            transform: scale(0.97);
        }

        .form-card {
            background: #f9fbfd;
            border-radius: 28px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e9f0;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #1e4663;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .appointment-type-group {
            display: flex;
            gap: 2rem;
            margin-bottom: 1rem;
            background: #ffffff;
            padding: 0.6rem 1.2rem;
            border-radius: 48px;
            width: fit-content;
            border: 1px solid #dde3ea;
        }
        .appointment-type-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            cursor: pointer;
        }
        .type-radio {
            accent-color: #1F5E8E;
        }

        .existing-patient-selector {
            background: #f0f4fa;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .existing-patient-selector label {
            font-weight: 600;
            color: #1f4662;
        }
        #existingPatientSelect {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid #cbdbe0;
            min-width: 220px;
            background: white;
        }
        .load-patient-btn {
            background: #2C8FBB;
            color: white;
            border: none;
            padding: 0.45rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .form-field label {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a627a;
        }
        .form-field input, .form-field select {
            padding: 0.7rem 0.9rem;
            border: 1px solid #cfdde9;
            border-radius: 18px;
            font-size: 0.9rem;
        }
        .form-field input:focus, .form-field select:focus {
            outline: none;
            border-color: #2C8FBB;
        }

        .date-strip {
            margin: 1.5rem 0 1.2rem 0;
        }
        .date-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-bottom: 0.8rem;
        }
        .date-chip {
            background: #f0f4f9;
            padding: 0.45rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .date-chip.active-chip {
            background: #1F5E8E;
            color: white;
        }
        .appointment-date-picker {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .btn-create {
            background: #1F5E8E;
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
        }

        .filter-panel {
            background: #ffffff;
            border-radius: 24px;
            padding: 1.2rem 1.5rem;
            margin: 1.8rem 0;
            border: 1px solid #e4ecf3;
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            align-items: flex-end;
            justify-content: space-between;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .filter-item input {
            padding: 0.6rem 1rem;
            border-radius: 28px;
            border: 1px solid #cbd5e1;
            min-width: 150px;
        }
        .search-group {
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
        }
        .filter-btn, .search-btn, .print-list-btn {
            background: #eef2f9;
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .search-btn {
            background: #2C8FBB;
            color: white;
        }
        .print-list-btn {
            background: #34a56f;
            color: white;
        }

        .table-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
            border: 1px solid #e9edf2;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            text-align: left;
            padding: 1rem 0.9rem;
            background: #f8fafd;
            border-bottom: 1px solid #e2e8f0;
        }
        td {
            padding: 0.9rem;
            border-bottom: 1px solid #ecf3f9;
        }
        .action-buttons {
            display: flex;
            gap: 0.4rem;
        }
        .edit-btn, .delete-btn, .print-row-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
        }
        .edit-btn:hover { background: #eef2ff; }
        .delete-btn:hover { background: #ffe6e6; color: #c0392b; }
        .print-row-btn:hover { background: #e0f2e9; color: #1e6f4c; }
        .empty-row td {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
        }
        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1e3b4b;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            z-index: 1000;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            .app-container, .app-container * {
                visibility: visible;
            }
            .app-container {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                margin: 0;
                padding: 1rem;
            }
            .form-card, .filter-panel, .create-appointment-btn, .print-list-btn,
            .btn-create, .action-buttons, .toast-msg, .existing-patient-selector,
            .appointment-type-group, .date-chips, .appointment-date-picker {
                display: none !important;
            }
            .table-wrapper {
                border: none;
            }
            th, td {
                border: 1px solid #ccc;
            }
        }

        .single-print-container {
            display: none;
        }
        @media print {
            .single-print-container {
                display: block;
                font-family: monospace;
            }
            body > *:not(.single-print-container) {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header-row">
        <h1>📅 Appointment</h1>
        <button class="create-appointment-btn" id="resetFormBtn">➕ Create Appointment</button>
    </div>

    <div class="form-card" id="appointmentFormCard">
        <div class="section-title">📝 Appointment Details</div>

        <div class="appointment-type-group">
            <label><input type="radio" name="apptType" value="Existing" class="type-radio" checked> Existing Patient</label>
            <label><input type="radio" name="apptType" value="New" class="type-radio"> New Patient</label>
        </div>

        <!-- Existing patient selector (hidden by default, shown when Existing is selected) -->
        <div class="existing-patient-selector" id="existingPatientSelector">
            <label>👤 Select Existing Patient:</label>
            <select id="existingPatientSelect">
                <option value="">-- Choose patient --</option>
            </select>
            <button type="button" class="load-patient-btn" id="loadPatientBtn">Load Details</button>
            <small style="color:#4a627a;">Loads name, mobile, gender (you can edit doctor/date)</small>
        </div>

        <div class="form-grid">
            <div class="form-field"><label>First Name *</label><input type="text" id="firstName" placeholder="First name"></div>
            <div class="form-field"><label>Middle Name</label><input type="text" id="middleName" placeholder="Middle name"></div>
            <div class="form-field"><label>Last Name *</label><input type="text" id="lastName" placeholder="Last name"></div>
        </div>
        <div class="form-grid">
            <div class="form-field"><label>Mobile No *</label><input type="tel" id="mobileNo" placeholder="9876543210"></div>
            <div class="form-field"><label>Gender</label>
                <select id="gender"><option>Male</option><option>Female</option><option>Other</option></select>
            </div>
            <div class="form-field"><label>Doctor (Type name)</label><input type="text" id="doctorName" placeholder="e.g., Dr. Smith"></div>
        </div>

        <div class="date-strip">
            <p>📆 Select Appointment Date</p>
            <div class="date-chips" id="dateChipsContainer"></div>
            <div class="appointment-date-picker">
                <label>📅 Or pick date:</label>
                <input type="date" id="appointmentDateInput">
            </div>
        </div>

        <button class="btn-create" id="saveAppointmentBtn">+ Save Appointment</button>
        <small style="display: block; margin-top: 12px;">* Required: First, Last, Mobile. Doctor is free text.</small>
    </div>

    <div class="filter-panel">
        <div class="filter-item"><label>📅 From Date</label><input type="date" id="filterFromDate"></div>
        <div class="filter-item"><label>📅 To Date</label><input type="date" id="filterToDate"></div>
        <div class="search-group">
            <div class="filter-item"><label>🔍 Name / Phone</label><input type="text" id="searchInput" placeholder="Search"></div>
            <button class="search-btn" id="searchBtn">Search</button>
        </div>
        <button class="filter-btn" id="resetFilterBtn">Reset Filters</button>
    </div>

    <div class="appointments-section">
        <div class="table-header-actions">
            <div class="section-title">📋 Appointments List</div>
            <button class="print-list-btn" id="printTableBtn">🖨️ Print Full List</button>
        </div>
        <div class="table-wrapper">
            <table id="appointmentsTable">
                <thead><tr><th>First</th><th>Middle</th><th>Last</th><th>Mobile</th><th>Gender</th><th>Doctor</th><th>Type</th><th>Appt Date</th><th>Actions</th></tr></thead>
                <tbody id="tableBody"><tr class="empty-row"><td colspan="9">No appointments yet.</td></tr></tbody>
            </table>
        </div>
    </div>
</div>
<div id="singlePrintContainer" class="single-print-container"></div>

<script>
    // ---------- DATA ----------
    let appointments = [];
    let editModeId = null;
    let uniquePatients = []; // list of distinct patients from appointment history (for Existing dropdown)

    // Fixed date range 26/04/2026 - 03/05/2026
    function getFixedDateRange() {
        const start = new Date(2026, 3, 26);
        let dates = [];
        for (let i = 0; i < 8; i++) {
            let d = new Date(start);
            d.setDate(start.getDate() + i);
            let year = d.getFullYear();
            let month = String(d.getMonth() + 1).padStart(2,'0');
            let day = String(d.getDate()).padStart(2,'0');
            dates.push(`${year}-${month}-${day}`);
        }
        return dates;
    }
    const fixedDateRange = getFixedDateRange();

    function formatDisplayDate(dateStr) {
        if (!dateStr) return '';
        let parts = dateStr.split('-');
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function persist() {
        localStorage.setItem('appointmentsData', JSON.stringify(appointments));
    }

    // extract unique patients from appointments (by firstName+lastName+mobile) — latest occurrence's gender/middle used
    function rebuildUniquePatients() {
        const map = new Map();
        appointments.forEach(app => {
            const key = `${app.firstName}|${app.lastName}|${app.mobileNo}`.toLowerCase();
            if (!map.has(key)) {
                map.set(key, {
                    id: key,
                    firstName: app.firstName,
                    middleName: app.middleName || '',
                    lastName: app.lastName,
                    mobileNo: app.mobileNo,
                    gender: app.gender
                });
            } else {
                // optionally update gender if changed, but keep
                let existing = map.get(key);
                if (app.gender) existing.gender = app.gender;
                if (app.middleName) existing.middleName = app.middleName;
            }
        });
        uniquePatients = Array.from(map.values());
        updateExistingPatientDropdown();
    }

    function updateExistingPatientDropdown() {
        const select = document.getElementById('existingPatientSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- Choose patient --</option>';
        uniquePatients.forEach(patient => {
            const fullName = `${patient.firstName} ${patient.middleName ? patient.middleName + ' ' : ''}${patient.lastName}`;
            const option = document.createElement('option');
            option.value = patient.id;
            option.textContent = `${fullName} (${patient.mobileNo})`;
            option.dataset.patient = JSON.stringify(patient);
            select.appendChild(option);
        });
    }

    function loadPatientToForm(patient) {
        if (!patient) return;
        document.getElementById('firstName').value = patient.firstName;
        document.getElementById('middleName').value = patient.middleName || '';
        document.getElementById('lastName').value = patient.lastName;
        document.getElementById('mobileNo').value = patient.mobileNo;
        document.getElementById('gender').value = patient.gender;
        // Doctor field remains as is (not overwritten to allow different doctor per visit)
        // but we can optionally keep current doctor or leave for user to type
        showToast(`Loaded patient: ${patient.firstName} ${patient.lastName}`);
    }

    // toggle visibility of existing patient selector based on radio
    function toggleExistingSelector() {
        const isExisting = document.querySelector('input[name="apptType"]:checked').value === 'Existing';
        const selectorDiv = document.getElementById('existingPatientSelector');
        selectorDiv.style.display = isExisting ? 'flex' : 'none';
        if (!isExisting) {
            // if New, clear form optionally (but keep maybe reset? but we will keep as is for new entry)
            // We do not clear fields automatically to allow quick entry, but user can reset manually
        } else {
            // refresh dropdown with latest patients
            rebuildUniquePatients();
        }
    }

    // render date chips
    function renderDateChips(selectedVal) {
        const container = document.getElementById('dateChipsContainer');
        if (!container) return;
        container.innerHTML = '';
        fixedDateRange.forEach(iso => {
            const chip = document.createElement('div');
            chip.className = 'date-chip';
            if (selectedVal === iso) chip.classList.add('active-chip');
            chip.textContent = formatDisplayDate(iso);
            chip.addEventListener('click', () => {
                document.getElementById('appointmentDateInput').value = iso;
                renderDateChips(iso);
            });
            container.appendChild(chip);
        });
    }

    function resetCreateForm() {
        document.getElementById('firstName').value = '';
        document.getElementById('middleName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('mobileNo').value = '';
        document.getElementById('gender').value = 'Male';
        document.getElementById('doctorName').value = '';
        document.querySelector('input[name="apptType"][value="Existing"]').checked = true;
        toggleExistingSelector();
        const defaultDate = fixedDateRange[0];
        document.getElementById('appointmentDateInput').value = defaultDate;
        renderDateChips(defaultDate);
        editModeId = null;
        const saveBtn = document.getElementById('saveAppointmentBtn');
        saveBtn.textContent = '+ Save Appointment';
        saveBtn.style.background = '#1F5E8E';
        // clear existing patient selection
        const select = document.getElementById('existingPatientSelect');
        if (select) select.value = '';
    }

    // filters
    let currentFilter = { fromDate: '', toDate: '', searchText: '' };
    function filterAppointments() {
        let filtered = [...appointments];
        if (currentFilter.fromDate) filtered = filtered.filter(a => a.appointmentDate >= currentFilter.fromDate);
        if (currentFilter.toDate) filtered = filtered.filter(a => a.appointmentDate <= currentFilter.toDate);
        if (currentFilter.searchText.trim()) {
            const term = currentFilter.searchText.trim().toLowerCase();
            filtered = filtered.filter(a => 
                (`${a.firstName} ${a.middleName} ${a.lastName}`).toLowerCase().includes(term) ||
                a.mobileNo.includes(term)
            );
        }
        return filtered;
    }

    // Print single appointment
    function printSingleAppointment(app) {
        const printDiv = document.getElementById('singlePrintContainer');
        const formattedDate = formatDisplayDate(app.appointmentDate);
        const fullName = `${app.firstName} ${app.middleName ? app.middleName + ' ' : ''}${app.lastName}`;
        printDiv.innerHTML = `
            <div style="max-width:700px; margin:20px auto; padding:20px; border:1px solid #ccc; border-radius:20px; font-family:monospace;">
                <h2 style="text-align:center; color:#1F5E8E;">📋 APPOINTMENT SLIP</h2>
                <hr>
                <p><strong>Patient:</strong> ${fullName}</p>
                <p><strong>Mobile:</strong> ${app.mobileNo}</p>
                <p><strong>Gender:</strong> ${app.gender}</p>
                <p><strong>Doctor:</strong> ${app.doctor}</p>
                <p><strong>Appointment Type:</strong> ${app.appointmentType}</p>
                <p><strong>Date:</strong> ${formattedDate}</p>
                <hr>
                <p style="font-size:12px;">Generated: ${new Date().toLocaleString()}</p>
            </div>
        `;
        printDiv.style.display = 'block';
        window.print();
        setTimeout(() => {
            printDiv.style.display = 'none';
            printDiv.innerHTML = '';
        }, 100);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const filtered = filterAppointments();
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="9">📭 No appointments found.</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        filtered.forEach(app => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = app.firstName;
            row.insertCell(1).textContent = app.middleName || '—';
            row.insertCell(2).textContent = app.lastName;
            row.insertCell(3).textContent = app.mobileNo;
            row.insertCell(4).textContent = app.gender;
            row.insertCell(5).textContent = app.doctor;
            row.insertCell(6).textContent = app.appointmentType;
            row.insertCell(7).textContent = formatDisplayDate(app.appointmentDate);
            const actionCell = row.insertCell(8);
            actionCell.className = 'action-buttons';
            const editBtn = document.createElement('button');
            editBtn.textContent = '✏️';
            editBtn.className = 'edit-btn';
            editBtn.onclick = () => editAppointment(app.id);
            const delBtn = document.createElement('button');
            delBtn.textContent = '🗑️';
            delBtn.className = 'delete-btn';
            delBtn.onclick = () => deleteAppointment(app.id);
            const printBtn = document.createElement('button');
            printBtn.textContent = '🖨️';
            printBtn.className = 'print-row-btn';
            printBtn.onclick = () => printSingleAppointment(app);
            actionCell.append(editBtn, delBtn, printBtn);
        });
    }

    function saveAppointment() {
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const mobileNo = document.getElementById('mobileNo').value.trim();
        if (!firstName || !lastName || !mobileNo) {
            showToast('First Name, Last Name and Mobile are required', true);
            return;
        }
        if (!/^\d{7,15}$/.test(mobileNo)) {
            showToast('Invalid mobile number', true);
            return;
        }
        const middleName = document.getElementById('middleName').value.trim();
        const gender = document.getElementById('gender').value;
        let doctor = document.getElementById('doctorName').value.trim();
        if (!doctor) {
            showToast('Please enter doctor name', true);
            return;
        }
        const appointmentType = document.querySelector('input[name="apptType"]:checked').value;
        let appointmentDate = document.getElementById('appointmentDateInput').value;
        if (!appointmentDate || !fixedDateRange.includes(appointmentDate)) {
            showToast(`Please select a date within ${formatDisplayDate(fixedDateRange[0])} - ${formatDisplayDate(fixedDateRange[7])}`, true);
            return;
        }

        if (editModeId !== null) {
            const idx = appointments.findIndex(a => a.id === editModeId);
            if (idx !== -1) {
                appointments[idx] = { ...appointments[idx], firstName, middleName, lastName, mobileNo, gender, doctor, appointmentType, appointmentDate };
                showToast('Appointment updated');
            }
            editModeId = null;
            document.getElementById('saveAppointmentBtn').textContent = '+ Save Appointment';
        } else {
            const newId = Date.now() + '' + Math.floor(Math.random() * 10000);
            appointments.push({ id: newId, firstName, middleName, lastName, mobileNo, gender, doctor, appointmentType, appointmentDate });
            showToast('New appointment created');
        }
        persist();
        rebuildUniquePatients();  // update existing patient list
        resetCreateForm();
        applyFiltersAndRender();
    }

    function editAppointment(id) {
        const app = appointments.find(a => a.id === id);
        if (!app) return;
        editModeId = id;
        document.getElementById('firstName').value = app.firstName;
        document.getElementById('middleName').value = app.middleName || '';
        document.getElementById('lastName').value = app.lastName;
        document.getElementById('mobileNo').value = app.mobileNo;
        document.getElementById('gender').value = app.gender;
        document.getElementById('doctorName').value = app.doctor;
        const radioVal = app.appointmentType;
        if (radioVal === 'Existing') document.querySelector('input[name="apptType"][value="Existing"]').checked = true;
        else document.querySelector('input[name="apptType"][value="New"]').checked = true;
        toggleExistingSelector();
        document.getElementById('appointmentDateInput').value = app.appointmentDate;
        renderDateChips(app.appointmentDate);
        const saveBtn = document.getElementById('saveAppointmentBtn');
        saveBtn.textContent = '✏️ Update Appointment';
        saveBtn.style.background = '#2c6e2f';
        document.getElementById('appointmentFormCard').scrollIntoView({ behavior: 'smooth' });
    }

    function deleteAppointment(id) {
        if (confirm('Delete this appointment?')) {
            appointments = appointments.filter(a => a.id !== id);
            if (editModeId === id) resetCreateForm();
            persist();
            rebuildUniquePatients();
            applyFiltersAndRender();
            showToast('Appointment deleted');
        }
    }

    function applyFiltersAndRender() {
        currentFilter = {
            fromDate: document.getElementById('filterFromDate').value,
            toDate: document.getElementById('filterToDate').value,
            searchText: document.getElementById('searchInput').value
        };
        renderTable();
    }

    function resetFilters() {
        document.getElementById('filterFromDate').value = '';
        document.getElementById('filterToDate').value = '';
        document.getElementById('searchInput').value = '';
        applyFiltersAndRender();
        showToast('Filters reset');
    }

    function showToast(msg, err = false) {
        let t = document.querySelector('.toast-msg');
        if (t) t.remove();
        let div = document.createElement('div');
        div.className = 'toast-msg';
        div.style.backgroundColor = err ? '#b91c1c' : '#1F5E8E';
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }

    // load demo data if empty
    function loadDemoData() {
        if (appointments.length === 0) {
            appointments = [
                { id: '1001', firstName: 'Aarav', middleName: 'Kumar', lastName: 'Sharma', mobileNo: '9876543210', gender: 'Male', doctor: 'Dr. Emily Clark', appointmentType: 'Existing', appointmentDate: fixedDateRange[2] },
                { id: '1002', firstName: 'Ishita', middleName: '', lastName: 'Verma', mobileNo: '9988776655', gender: 'Female', doctor: 'Dr. Sarah Varma', appointmentType: 'New', appointmentDate: fixedDateRange[4] },
                { id: '1003', firstName: 'Rohan', middleName: 'Raj', lastName: 'Mehta', mobileNo: '9123456789', gender: 'Male', doctor: 'Dr. Anjali Kapoor', appointmentType: 'Existing', appointmentDate: fixedDateRange[0] }
            ];
            persist();
        }
    }

    function init() {
        const stored = localStorage.getItem('appointmentsData');
        if (stored) appointments = JSON.parse(stored);
        else loadDemoData();
        rebuildUniquePatients();
        resetCreateForm();
        applyFiltersAndRender();

        // Event listeners
        document.getElementById('saveAppointmentBtn').addEventListener('click', saveAppointment);
        document.getElementById('searchBtn').addEventListener('click', applyFiltersAndRender);
        document.getElementById('resetFilterBtn').addEventListener('click', resetFilters);
        document.getElementById('resetFormBtn').addEventListener('click', () => { resetCreateForm(); editModeId = null; showToast('Form reset'); });
        document.getElementById('printTableBtn').addEventListener('click', () => window.print());
        document.getElementById('loadPatientBtn').addEventListener('click', () => {
            const select = document.getElementById('existingPatientSelect');
            const selectedOption = select.options[select.selectedIndex];
            if (selectedOption && selectedOption.value) {
                const patientData = JSON.parse(selectedOption.dataset.patient);
                loadPatientToForm(patientData);
            } else {
                showToast('Select a patient first', true);
            }
        });
        const radios = document.querySelectorAll('input[name="apptType"]');
        radios.forEach(r => r.addEventListener('change', toggleExistingSelector));
        const datePicker = document.getElementById('appointmentDateInput');
        datePicker.addEventListener('change', (e) => renderDateChips(e.target.value));
        toggleExistingSelector();
        renderDateChips(fixedDateRange[0]);
    }

    init();
</script>
</body>
</html>
